<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz da Iara - GOD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #001f3f, #0074D9);
  color: white;
  text-align: center;
  transition: 0.5s;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

button {
  width: 220px;
  padding: 12px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #00d4ff;
  color: black;
}

#pontuacao { font-size: 22px; }
#animacao { font-size: 28px; height: 40px; }
#tempo { font-size: 20px; margin: 10px; }

.barra {
  width: 100%;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}

.progresso {
  height: 10px;
  width: 0%;
  background: #00ffcc;
  transition: 0.5s;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  animation: fade 0.5s;
}

img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
  margin-top: 10px;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>
<div class="container">

<h1>🌊 Quiz da Iara 🌊</h1>

<div id="inicio">
  <input id="nome" placeholder="Seu nome"><br><br>
  <button onclick="iniciar()">Começar</button>
</div>

<div id="jogo" style="display:none">
  <div id="pontuacao">Pontuação: 0</div>
  <div id="tempo">⏱️ 10</div>
  <div id="animacao"></div>

  <div class="barra">
    <div id="barra" class="progresso"></div>
  </div>

  <img id="img">
  <div id="quiz" class="card"></div>
</div>

<div id="fim"></div>
<div id="ranking"></div>

</div>

<script>

// 🔊 sons
const somAcerto = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const somErro = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// 🌊 imagens
const imagens = [
 "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
 "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
 "https://images.unsplash.com/photo-1441974231531-c6227db76b6e",
 "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
];

// ❓ perguntas
const perguntas = [
 {p:"O que causou a transformação da Iara?", op:["Magia","Castigo do pai","Deus"], c:1},
 {p:"Por que os irmãos tinham inveja?", op:["Beleza","Habilidade","Riqueza"], c:1},
 {p:"Quem salvou Iara?", op:["Peixes","Pajé","Deus"], c:0},
 {p:"Onde ela vive?", op:["Amazônia","Sul","Cidade"], c:0},
 {p:"O que o canto faz?", op:["Mata","Encanta","Nada"], c:1},
 {p:"Como ela atrai homens?", op:["Força","Canto","Luz"], c:1},
 {p:"Como ficam os que voltam?", op:["Normais","Loucos","Fortes"], c:1}
];

let atual=0, pontos=0, tempo=10, timer, nome="";

function iniciar(){
  nome = document.getElementById("nome").value;
  if(!nome){ alert("Digite seu nome"); return; }

  document.getElementById("inicio").style.display="none";
  document.getElementById("jogo").style.display="block";
  mostrar();
}

function mostrar(){
  let q = perguntas[atual];

  document.getElementById("img").src = imagens[atual % imagens.length];

  let div = document.getElementById("quiz");
  div.innerHTML = `<h3>${q.p}</h3>`;

  q.op.forEach((op,i)=>{
    div.innerHTML += `<button onclick="responder(${i})">${op}</button><br>`;
  });

  atualizarBarra();
  iniciarTempo();
}

function iniciarTempo(){
  tempo = 10;
  document.getElementById("tempo").innerText = "⏱️ " + tempo;

  clearInterval(timer);
  timer = setInterval(()=>{
    tempo--;
    document.getElementById("tempo").innerText = "⏱️ " + tempo;

    if(tempo <= 0){
      clearInterval(timer);
      responder(-1);
    }
  },1000);
}

function responder(i){
  clearInterval(timer);

  let correta = perguntas[atual].c;
  let anim = document.getElementById("animacao");

  if(i === correta){
    pontos += 10;
    anim.innerHTML = "✅ +10";
    anim.style.color = "#00ff88";
    somAcerto.play();
  } else {
    pontos -= 5;
    anim.innerHTML = "❌ -5";
    anim.style.color = "#ff4d4d";
    somErro.play();
  }

  document.getElementById("pontuacao").innerText = "Pontuação: " + pontos;

  atual++;

  setTimeout(()=>{
    anim.innerHTML="";
    if(atual < perguntas.length){
      mostrar();
    } else {
      finalizar();
    }
  },800);
}

function atualizarBarra(){
  let progresso = (atual / perguntas.length) * 100;
  document.getElementById("barra").style.width = progresso + "%";
}

function finalizar(){
  document.getElementById("jogo").style.display="none";

  let nivel = pontos < 20 ? "Iniciante"
            : pontos < 50 ? "Intermediário"
            : "Mestre";

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];
  ranking.push({nome,pontos});
  ranking.sort((a,b)=>b.pontos-a.pontos);
  ranking = ranking.slice(0,5);
  localStorage.setItem("ranking", JSON.stringify(ranking));

  document.getElementById("fim").innerHTML = `
    <h2>🏆 Fim de Jogo</h2>
    <h3>${nome}, sua pontuação: ${pontos}</h3>
    <h3>Nível: ${nivel}</h3>
    <button onclick="location.reload()">Jogar novamente</button>
  `;

  let div = document.getElementById("ranking");
  div.innerHTML = "<h3>🏆 Ranking</h3>";

  ranking.forEach(r=>{
    div.innerHTML += `<p>${r.nome} - ${r.pontos}</p>`;
  });
}

</script>
</body>
</html>
